<p class="auto-style1">自我介紹</p>
<p class="auto-style2">我叫黃聖惟，目前就讀於多媒體設計系。</p>
<p class="auto-style2">
平常很喜歡畫畫，也對動畫、影像敘事和視覺設計特別有興趣。創作時，我會比較在意「畫面怎麼說故事」，不管是動畫、分鏡、或是平面設計，我都希望作品本身就能讓人感覺到情緒和想法。</p>
<p class="auto-style2">最近的創作方向多半圍繞在動畫與視覺企劃上，也嘗試把 2D 和 3D 結合，用比較簡單的動作去呈現完整的故事。我也對 
AI 工具在創作流程中的應用很有興趣，會把它當成輔助，而不是取代創作本身。</p>
<p class="auto-style2">希望之後能持續把自己的想法轉換成更成熟的作品。</p>
